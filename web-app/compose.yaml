services:
  go-server:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: srv-go-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DB_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    restart: always
    depends_on:
      - db
  db:
    image: postgres:17.1
    container_name: db-go-app

    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data

volumes:
  postgres-data: