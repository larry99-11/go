<!-- Using bootstrap as CSS framework -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <style>
        .my-footer {
            height: 5em;
            background-color: #1d2120;
            margin-top: 1.5em;
            padding: 1em;
            color: #fff;
            font-size: 70%;
        }
    </style>
    <title>Reservations</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">About</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Rooms</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/family-rooms">Family Rooms</a></li>
                        <li><a class="dropdown-item" href="/student-rooms">Student Accommodation</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/more">More</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/bookings">Book Now</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/contact">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>


<div class="container">
    <div class="row">
        <div class="col-md-6">
            <h1>Make reservation</h1>
            <form method="POST" action="" class="validation" novalidate >
                <div class="form-group mt-5"> 
                    <label for="first_name">First name:</label> 
                    <input type="text" name="first_name" id="first_name" class="form-control" required autocomplete="off">
                </div>

                 <div class="form-group"> 
                    <label for="last_name">Last name:</label> 
                    <input type="text" name="last_name" id="last_name" class="form-control" required autocomplete="off">
                </div>

                 <div class="form-group"> 
                    <label for="Email">Email:</label> 
                    <input type="email" name="email" id="Email" class="form-control" required autocomplete="off">
                </div>

                 <div class="form-group"> 
                    <label for="phone">Phone number:</label> 
                    <input type="text" name="phone" id="phone" class="form-control" required autocomplete="off">
                </div>
                <hr>
                <input type="submit" class="btn-primary" value="Make reservation">
            </form>
        </div>
    </div>
      
    </div>
</div>

<div class="row my-footer">
    <div class="col">Left</div>
    <div class="col text-center">Middle</div>
    <div class="col text-end">Right</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjvrilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
